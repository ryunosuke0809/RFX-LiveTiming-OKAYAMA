# MOLA Timing Okayama — nginx
# 外部公開は 80/443 のみ。アプリは 127.0.0.1 の Node へ。
#
# ホスト:
#   mola-timing-okayama.com              … 一般向け（GPS 場内制限 / 将来 IP 制限）
#   oic-private.mola-timing-okayama.com  … 関係者向け（制限なし）
#   www → apex へリダイレクト

# 訪問者集計用（IP / 時刻 / メソッド / URL / ステータス / UA / Referer）
log_format mola_access '$remote_addr - $remote_user [$time_local] '
                       '"$request" $status $body_bytes_sent '
                       '"$http_referer" "$http_user_agent" '
                       'rt=$request_time';

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream mola_frontend {
    server 127.0.0.1:3000;
    keepalive 32;
}

upstream mola_backend {
    server 127.0.0.1:4000;
    keepalive 32;
}

# HTTP → HTTPS（証明書発行後に有効。発行前は certbot が .well-known を使う）
server {
    listen 80;
    listen [::]:80;
    server_name mola-timing-okayama.com www.mola-timing-okayama.com
                oic-private.mola-timing-okayama.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # www → apex、それ以外（apex / oic-private）はホスト維持で HTTPS へ
    location / {
        if ($host = www.mola-timing-okayama.com) {
            return 301 https://mola-timing-okayama.com$request_uri;
        }
        return 301 https://$host$request_uri;
    }
}

# ---- 一般向け HTTPS（GPS はフロント / IP 制限は将来ここに追加） ----
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name mola-timing-okayama.com www.mola-timing-okayama.com;

    ssl_certificate     /etc/letsencrypt/live/mola-timing-okayama.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mola-timing-okayama.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # www → apex
    if ($host = www.mola-timing-okayama.com) {
        return 301 https://mola-timing-okayama.com$request_uri;
    }

    # --- 将来: IP 制限を有効にするとき、下をアンコメント ---
    # include /etc/nginx/snippets/mola-public-ip-allowlist.conf;

    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header X-Frame-Options SAMEORIGIN always;

    client_max_body_size 2m;

    access_log /var/log/nginx/mola-timing-access.log mola_access;
    error_log  /var/log/nginx/mola-timing-error.log warn;

    include /etc/nginx/snippets/mola-proxy-locations.conf;
}

# ---- 関係者向け HTTPS（制限なし。IP 許可リストは付けない） ----
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name oic-private.mola-timing-okayama.com;

    ssl_certificate     /etc/letsencrypt/live/mola-timing-okayama.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mola-timing-okayama.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header X-Frame-Options SAMEORIGIN always;

    client_max_body_size 2m;

    access_log /var/log/nginx/mola-timing-access.log mola_access;
    error_log  /var/log/nginx/mola-timing-error.log warn;

    include /etc/nginx/snippets/mola-proxy-locations.conf;
}
