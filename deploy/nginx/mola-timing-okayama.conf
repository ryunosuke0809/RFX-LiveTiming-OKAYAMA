# MOLA Timing Okayama — nginx
# 外部公開は 80/443 のみ。アプリは 127.0.0.1 の Node へ。

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream mola_frontend {
    server 127.0.0.1:3000;
    keepalive 32;
}

upstream mola_backend {
    server 127.0.0.1:4000;
    keepalive 32;
}

# HTTP → HTTPS（証明書発行後に有効。発行前は certbot が .well-known を使う）
server {
    listen 80;
    listen [::]:80;
    server_name mola-timing-okayama.com www.mola-timing-okayama.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://mola-timing-okayama.com$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name mola-timing-okayama.com www.mola-timing-okayama.com;

    # certbot が書き換える想定。初回は issue-cert.sh が配置する。
    ssl_certificate     /etc/letsencrypt/live/mola-timing-okayama.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mola-timing-okayama.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # www → apex
    if ($host = www.mola-timing-okayama.com) {
        return 301 https://mola-timing-okayama.com$request_uri;
    }

    # セキュリティヘッダ（最低限）
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header X-Frame-Options SAMEORIGIN always;

    client_max_body_size 2m;

    # WebSocket: フロント購読
    location /ws {
        proxy_pass http://mola_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Origin $http_origin;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # WebSocket: Receiver ingest
    location /ingest {
        proxy_pass http://mola_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # バックエンド REST
    location /api/ {
        proxy_pass http://mola_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Next.js
    location / {
        proxy_pass http://mola_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}
